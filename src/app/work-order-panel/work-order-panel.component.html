<!-- @upgrade: Add ARIA attributes for accessibility:
     - aria-modal="true" on panel
     - aria-labelledby pointing to panel title
     - aria-describedby for form description
     - role="dialog" on panel
     - Proper focus trap and return focus on close -->
<div class="panel-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="panel" (click)="$event.stopPropagation()">
    <div class="panel-header">
      <div class="panel-header-content">
        <div class="panel-header-text">
          <h2 class="panel-title">Work Order Details</h2>
          <p class="panel-subtitle">Specify the dates, name and status for this order</p>
        </div>
        <div class="panel-header-actions">
          <button class="btn-cancel" (click)="onClose()">Cancel</button>
          <button 
            class="btn-save" 
            (click)="onSubmit()"
            [disabled]="workOrderForm.invalid">
            {{ mode === 'create' ? 'Create' : 'Save' }}
          </button>
        </div>
      </div>
    </div>

    <form [formGroup]="workOrderForm" class="panel-form">
      <!-- Work Order Name -->
      <div class="form-group">
        <label class="form-label">Work Order Name</label>
        <input 
          type="text" 
          class="form-input name-input"
          formControlName="name"
          placeholder="Acme Inc."
          [class.error]="workOrderForm.get('name')?.invalid && workOrderForm.get('name')?.touched">
        <div 
          *ngIf="workOrderForm.get('name')?.invalid && workOrderForm.get('name')?.touched" 
          class="error-message">
          Work order name is required
        </div>
      </div>

      <!-- Status -->
      <div class="form-group">
        <label class="form-label">Status</label>
        <ng-select
          formControlName="status"
          [items]="statusOptions"
          bindValue="value"
          bindLabel="label"
          [clearable]="false"
          [searchable]="true"
          [class.error]="workOrderForm.get('status')?.invalid && workOrderForm.get('status')?.touched"
          [class.status-focused]="isStatusSelectFocused"
          #statusSelect>
          <ng-template ng-label-tmp let-item="item">
            <span 
              class="status-badge-label"
              [style.color]="getStatusTextColor(item.value)"
              [style.background-color]="getStatusBackgroundColor(item.value)">
              {{ item.label }}
            </span>
          </ng-template>
        </ng-select>
        <div 
          *ngIf="workOrderForm.get('status')?.invalid && workOrderForm.get('status')?.touched" 
          class="error-message">
          Status is required
        </div>
      </div>

      <!-- Work Center -->
      <!-- <div class="form-group">
        <label class="form-label">Work Center</label>
        <ng-select
          formControlName="workCenterId"
          [items]="workCenters"
          bindValue="docId"
          bindLabel="data.name"
          [class.error]="workOrderForm.get('workCenterId')?.invalid && workOrderForm.get('workCenterId')?.touched">
        </ng-select>
        <div 
          *ngIf="workOrderForm.get('workCenterId')?.invalid && workOrderForm.get('workCenterId')?.touched" 
          class="error-message">
          Work center is required
        </div>
      </div> -->

      <!-- Start Date -->
      <div class="form-group">
        <label class="form-label">Start date</label>
        <!-- @upgrade: Consider inline datepicker or calendar view for better date selection UX.
             Could show month view inline, allow keyboard navigation, and provide date range validation feedback. -->
        <input
        class="form-input date-input"
        formControlName="startDate"
        ngbDatepicker
        #startDatePicker="ngbDatepicker"
        (click)="startDatePicker.toggle()"
        readonly
      />
        <div 
          *ngIf="workOrderForm.get('startDate')?.invalid && workOrderForm.get('startDate')?.touched" 
          class="error-message">
          Start date is required
        </div>
      </div>

      <!-- End Date -->
      <div class="form-group">
        <label class="form-label">End date</label>
        <input
        class="form-input date-input"
        formControlName="endDate"
        ngbDatepicker
        #endDatePicker="ngbDatepicker"
        (click)="endDatePicker.toggle()"
        readonly
      />
        <div 
          *ngIf="workOrderForm.get('endDate')?.invalid && workOrderForm.get('endDate')?.touched" 
          class="error-message">
          End date is required and must be after start date
        </div>
      </div>

      <!-- Overlap Error -->
      <div *ngIf="overlapError" class="overlap-error">
        {{ overlapError }}
      </div>
    </form>
  </div>
</div>
