<div class="timeline-wrapper">
  <div class="logo-row">
    <div class="logo">NAOLOGIC</div>
  </div>
  <div class="title-row">
    <h2 class="title">Work Orders</h2>
  </div>
  <div class="timescale-card-row">
    <div class="timescale-card">
      <div class="timescale-label-wrapper">
        <div class="timescale-label">Timescale</div>
      </div>
      <div class="timescale-select-wrapper">
        <ng-select
          class="timescale-ng-select"
          [(ngModel)]="timescale"
          (ngModelChange)="onTimescaleChange()"
          [items]="timescaleOptions"
          bindValue="value"
          bindLabel="label"
          [searchable]="false"
          [clearable]="false">
        </ng-select>
      </div>
    </div>
  </div>
  
  <div class="row">
      
    <button type="button" class="btn-go-to-current" (click)="goToCurrent()">
      {{ goToCurrentLabel }}
    </button>
    </div>
  <!-- Timeline Grid -->
  <div class="timeline-container">
    <!-- Work Center Column -->
    <div class="work-center-column" #workCenterColumn>
      <!-- Logo Row -->
      
      
      <!-- Title Row -->
     
      
      
      
      <div class="work-center-header">Work Center</div>
      <div class="work-center-rows-container">
        <div 
          *ngFor="let center of workCenters; let i = index" 
          class="work-center-row"
          [class.hovered]="hoveredWorkCenterIndex === i"
          (mouseenter)="hoveredWorkCenterIndex = i"
          (mouseleave)="hoveredWorkCenterIndex = null">
          {{ center.data.name }}
        </div>
      </div>
    </div>

    <!-- Timeline Grid -->
    <div 
      #timelineGrid 
      class="timeline-grid"
      (scroll)="onTimelineScroll($event)">
      
      <!-- Date Headers -->
      <div class="timeline-header-row" [style.width.px]="getTotalTimelineWidth()">
        <div 
          *ngFor="let column of columns" 
          class="timeline-column-header"
          [style.width.px]="column.width">
          <div class="column-label">{{ column.label }}</div>
        </div>
      </div>

      <!-- Work Center Rows with Work Orders -->
      <div class="timeline-rows-container" [style.width.px]="getTotalTimelineWidth()">
        <div 
          *ngFor="let center of workCenters; let i = index" 
          class="timeline-row"
          [class.hovered]="hoveredWorkCenterIndex === i"
          (mouseenter)="hoveredWorkCenterIndex = i"
          (mouseleave)="onTimelineRowMouseLeave()"
          (mousemove)="onTimelineRowMouseMove($event, i)"
          (mousedown)="onTimelineRowMouseDown($event, i)"
          (click)="onTimelineClick($event, i)">
          
          <!-- Column separators - grey lines (only in first row) -->
          <ng-container *ngIf="i === 0">
            <div 
              *ngFor="let column of columns" 
              class="timeline-column-separator"
              [style.left.px]="getColumnLeftPosition(column)">
            </div>
          </ng-container>
          <!-- Current Date Indicator (only in first row) -->
          <ng-container *ngIf="i === 0">
            <ng-container *ngFor="let column of columns">
              <div 
                *ngIf="isCurrentDateInColumn(column)" 
                class="current-date-indicator-row"
                [style.left.px]="getCurrentDateLinePosition(column)">
                <div class="current-date-label">{{ getCurrentDateLabel() }}</div>
              </div>
            </ng-container>
          </ng-container>
          
          <!-- Current Day Indicator Line -->
          <ng-container *ngFor="let column of columns">
            <div 
              *ngIf="isCurrentDateInColumn(column)"
              class="current-date-line-row"
              [style.left.px]="getCurrentDateLinePosition(column)">
            </div>
          </ng-container>
          
          <!-- Placeholder for empty area -->
          <div 
            *ngIf="hoveredTimelineCell?.workCenterIndex === i"
            class="timeline-placeholder"
            [style.left.px]="hoveredTimelineCell!.x">
          </div>
          
          <!-- Work Order Bars -->
          <div 
            *ngFor="let bar of getBarsForWorkCenter(center.docId)"
            class="work-order-bar"
            [class.small-bar]="bar.width < 120"
            [style.left.px]="bar.left"
            [style.width.px]="bar.width"
            [style.background-color]="getStatusColor(bar.order.data.status)"
            [style.box-shadow]="getStatusBoxShadow(bar.order.data.status)"
            (click)="onWorkOrderBarClick($event, bar)"
            (mouseenter)="hoveredTimelineCell = null">
            
            <div class="work-order-content">
              <span class="work-order-name">{{ bar.order.data.name }}</span>
            </div>
            
            <span 
              class="work-order-status"
              [style.color]="getStatusTextColor(bar.order.data.status)"
              [style.background-color]="getStatusBackgroundColor(bar.order.data.status)">
              {{ getStatusLabel(bar.order.data.status) }}
            </span>
            
            <button 
              class="work-order-actions"
              (click)="onActionsClick($event, bar.order)"
              (click.stop)="true"
              (mouseenter)="$event.stopPropagation()">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
                <circle cx="2" cy="6" r="1.25"/>
                <circle cx="6" cy="6" r="1.25"/>
                <circle cx="10" cy="6" r="1.25"/>
              </svg>
            </button>
          </div>

          <!-- Selection Overlay -->
          <div 
            *ngIf="selectionRange && selectionRange.workCenterIndex === i"
            class="timeline-selection-overlay"
            [style.left.px]="selectionRange.left"
            [style.width.px]="selectionRange.width"
            (click)="$event.stopPropagation()">
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Selection Floating Menu -->
  <div 
    *ngIf="selectionRange" 
    class="selection-menu"
    [style.left.px]="getSelectionMenuLeft()"
    [style.top.px]="getSelectionMenuTop()"
    (click)="$event.stopPropagation()">
    <button class="selection-menu-item" (click)="onSelectionCreate()">Create</button>
    <button class="selection-menu-item" (click)="onSelectionEdit()">Edit</button>
    <div class="selection-menu-caret"></div>
  </div>

  <!-- Actions Menu -->
  <div 
    *ngIf="showActionsMenu" 
    class="actions-menu"
    [style.left.px]="showActionsMenu.x"
    [style.top.px]="showActionsMenu.y"
    (click)="$event.stopPropagation()">
    <button 
      class="menu-item"
      (click)="onEdit(getOrderById(showActionsMenu!.orderId))">
      Edit
    </button>
    <button 
      class="menu-item menu-item-delete"
      (click)="onDelete(getOrderById(showActionsMenu!.orderId))">
      Delete
    </button>
  </div>

  <!-- Click outside to close menu -->
  <div 
    *ngIf="showActionsMenu" 
    class="actions-menu-overlay"
    (click)="closeActionsMenu()">
  </div>

  <!-- Tooltip for empty timeline cells -->
  <div 
    *ngIf="hoveredTimelineCell" 
    class="timeline-tooltip"
    [style.left.px]="hoveredTimelineCell!.tooltipLeft"
    [style.top.px]="hoveredTimelineCell!.tooltipTop"
    (mouseenter)="onTooltipMouseEnter()"
    (mouseleave)="onTimelineRowMouseLeave()">
    Click to add dates
  </div>
</div>
